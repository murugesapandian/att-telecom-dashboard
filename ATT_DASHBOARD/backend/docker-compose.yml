version: '3.8'

services:
  # ── Message Broker ──────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: att-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - att-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: att-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - att-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 5

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: att-kafka-ui
    depends_on:
      - kafka
    environment:
      KAFKA_CLUSTERS_0_NAME: att-kafka-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    ports:
      - "9090:8080"
    networks:
      - att-network

  # ── API Gateway ─────────────────────────────────────────
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: att-api-gateway
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: docker
    networks:
      - att-network
    depends_on:
      - kafka
    restart: unless-stopped

  # ── State Analytics Service ──────────────────────────────
  state-analytics-service:
    build:
      context: ./state-analytics-service
      dockerfile: Dockerfile
    container_name: att-state-analytics
    ports:
      - "8081:8081"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/state_analytics.db
    volumes:
      - state-data:/data
    networks:
      - att-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Provider Service ─────────────────────────────────────
  provider-service:
    build:
      context: ./provider-service
      dockerfile: Dockerfile
    container_name: att-provider-service
    ports:
      - "8082:8082"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/provider.db
    volumes:
      - provider-data:/data
    networks:
      - att-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Feedback Service ─────────────────────────────────────
  feedback-service:
    build:
      context: ./feedback-service
      dockerfile: Dockerfile
    container_name: att-feedback-service
    ports:
      - "8083:8083"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/feedback.db
    volumes:
      - feedback-data:/data
    networks:
      - att-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Plan Comparison Service ──────────────────────────────
  plan-comparison-service:
    build:
      context: ./plan-comparison-service
      dockerfile: Dockerfile
    container_name: att-plan-comparison
    ports:
      - "8084:8084"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/plan_comparison.db
    volumes:
      - plan-data:/data
    networks:
      - att-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

  # ── Event Streaming Service ──────────────────────────────
  event-streaming-service:
    build:
      context: ./event-streaming-service
      dockerfile: Dockerfile
    container_name: att-event-streaming
    ports:
      - "8085:8085"
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      SPRING_DATASOURCE_URL: jdbc:sqlite:/data/events.db
    volumes:
      - events-data:/data
    networks:
      - att-network
    depends_on:
      kafka:
        condition: service_healthy
    restart: unless-stopped

volumes:
  state-data:
  provider-data:
  feedback-data:
  plan-data:
  events-data:

networks:
  att-network:
    driver: bridge
