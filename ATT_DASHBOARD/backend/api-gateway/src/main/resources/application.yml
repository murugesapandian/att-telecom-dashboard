server:
  port: 8080

spring:
  application:
    name: att-api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
      routes:
        - id: logs
          uri: http://localhost:8081
          predicates:
            - Path=/api/logs/**
          filters:
            - StripPrefix=1

        - id: state-analytics
          uri: http://localhost:8081
          predicates:
            - Path=/api/states/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: provider-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/providers/**
          filters:
            - StripPrefix=1

        - id: feedback-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/feedback/**
          filters:
            - StripPrefix=1

        - id: plan-comparison
          uri: http://localhost:8084
          predicates:
            - Path=/api/plans/**
          filters:
            - StripPrefix=1

        - id: event-streaming
          uri: http://localhost:8085
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.att: INFO
