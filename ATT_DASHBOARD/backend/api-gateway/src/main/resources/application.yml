server:
  port: 8080

spring:
  application:
    name: att-api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
      routes:
        - id: logs
          uri: http://localhost:8081
          predicates:
            - Path=/api/logs/**
          filters:
            - StripPrefix=1

        - id: state-analytics
          uri: http://localhost:8081
          predicates:
            - Path=/api/states/**
          filters:
            - StripPrefix=1
            - name: RequestRateLimiter
              args:
                redis-rate-limiter.replenishRate: 10
                redis-rate-limiter.burstCapacity: 20

        - id: provider-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/providers/**
          filters:
            - StripPrefix=1

        - id: feedback-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/feedback/**
          filters:
            - StripPrefix=1

        - id: plan-comparison
          uri: http://localhost:8084
          predicates:
            - Path=/api/plans/**
          filters:
            - StripPrefix=1

        - id: event-streaming
          uri: http://localhost:8085
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0

        # ── Swagger API-docs proxy routes (forward /v3/api-docs/<service> → each service) ──
        - id: swagger-state-analytics
          uri: http://localhost:8081
          predicates:
            - Path=/v3/api-docs/state-analytics
          filters:
            - SetPath=/v3/api-docs

        - id: swagger-feedback
          uri: http://localhost:8083
          predicates:
            - Path=/v3/api-docs/feedback
          filters:
            - SetPath=/v3/api-docs

        - id: swagger-plan-comparison
          uri: http://localhost:8084
          predicates:
            - Path=/v3/api-docs/plan-comparison
          filters:
            - SetPath=/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.att: INFO

# ── Unified Swagger UI (aggregates all 3 microservices) ──
# URL: http://localhost:8080/swagger-ui.html
springdoc:
  swagger-ui:
    path: /swagger-ui.html
    urls:
      - name: "State Analytics API  (port 8081)"
        url: /v3/api-docs/state-analytics
      - name: "Feedback & Sentiment API  (port 8083)"
        url: /v3/api-docs/feedback
      - name: "Plan Comparison API  (port 8084)"
        url: /v3/api-docs/plan-comparison
    urls-primary-name: "State Analytics API  (port 8081)"
    display-request-duration: true
    groups-order: ASC
    operations-sorter: alpha
    disable-swagger-default-url: true
  api-docs:
    enabled: false   # Gateway itself has no REST endpoints to document
