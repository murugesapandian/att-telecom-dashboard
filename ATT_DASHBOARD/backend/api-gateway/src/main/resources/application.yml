server:
  port: 8080

spring:
  application:
    name: att-api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:3000"
              - "http://localhost:3001"
            allowedMethods: ["GET", "POST", "PUT", "DELETE", "OPTIONS"]
            allowedHeaders: ["*"]
            allowCredentials: true
      routes:
        - id: logs
          uri: http://localhost:8081
          predicates:
            - Path=/api/logs/**
          filters:
            - StripPrefix=1

        - id: state-analytics
          uri: http://localhost:8081
          predicates:
            - Path=/api/states/**
          filters:
            - StripPrefix=1

        - id: provider-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/providers/**
          filters:
            - StripPrefix=1

        - id: feedback-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/feedback/**
          filters:
            - StripPrefix=1

        - id: plan-comparison
          uri: http://localhost:8084
          predicates:
            - Path=/api/plans/**
          filters:
            - StripPrefix=1

        - id: event-streaming
          uri: http://localhost:8085
          predicates:
            - Path=/ws/**
          filters:
            - StripPrefix=0

        # ── Swagger UI static assets — proxy from state-analytics-service ──
        - id: swagger-ui-assets
          uri: http://localhost:8081
          predicates:
            - Path=/swagger-ui/**,/webjars/**
          filters:
            - PreserveHostHeader

        # ── Swagger API-docs proxy routes (forward /v3/api-docs/<service> → each service) ──
        - id: swagger-state-analytics
          uri: http://localhost:8081
          predicates:
            - Path=/v3/api-docs/state-analytics
          filters:
            - SetPath=/v3/api-docs

        - id: swagger-feedback
          uri: http://localhost:8083
          predicates:
            - Path=/v3/api-docs/feedback
          filters:
            - SetPath=/v3/api-docs

        - id: swagger-plan-comparison
          uri: http://localhost:8084
          predicates:
            - Path=/v3/api-docs/plan-comparison
          filters:
            - SetPath=/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,gateway
  endpoint:
    health:
      show-details: always

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    com.att: INFO

# Swagger UI served via proxy from state-analytics-service (port 8081)
# The gateway proxies /swagger-ui/** and /webjars/** to 8081,
# and /v3/api-docs/<service> to each respective service.
# Use http://localhost:8081/swagger-ui.html for the direct Swagger UI.
